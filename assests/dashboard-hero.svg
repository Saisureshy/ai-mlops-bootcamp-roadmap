<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">AI and MLOps Learning Progress Illustration</title>
  <desc id="desc">Abstract gradient waves, bars, and nodes representing learning progression</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF2FF"/>
      <stop offset="100%" stop-color="#E9FBF6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F6FFF"/>
      <stop offset="100%" stop-color="#00B894"/>
    </linearGradient>
  </defs>

  <rect width="920" height="260" rx="24" fill="url(#bg)"/>

  <g opacity="0.45">
    <circle cx="120" cy="52" r="44" fill="#0F6FFF"/>
    <circle cx="860" cy="48" r="60" fill="#00B894"/>
    <circle cx="780" cy="214" r="36" fill="#0F6FFF"/>
  </g>

  <path d="M50 190 C160 140 230 170 320 120 C420 64 530 92 612 72 C710 46 790 92 880 50" fill="none" stroke="url(#line)" stroke-width="7" stroke-linecap="round"/>

  <g fill="#0F2F71">
    <rect x="90" y="168" width="24" height="42" rx="6"/>
    <rect x="126" y="148" width="24" height="62" rx="6"/>
    <rect x="162" y="130" width="24" height="80" rx="6"/>
    <rect x="198" y="110" width="24" height="100" rx="6"/>
  </g>

  <g fill="#ffffff" stroke="#0F6FFF" stroke-width="4">
    <circle cx="322" cy="120" r="11"/>
    <circle cx="450" cy="88" r="11"/>
    <circle cx="612" cy="72" r="11"/>
    <circle cx="768" cy="76" r="11"/>
  </g>

  <text x="52" y="56" fill="#0B2A66" font-size="28" font-family="Sora, Segoe UI, sans-serif" font-weight="700">Build. Deploy. Scale.</text>
  <text x="52" y="86" fill="#1F4A96" font-size="16" font-family="Space Grotesk, Segoe UI, sans-serif">Your AI and MLOps journey in one place</text>
</svg>
